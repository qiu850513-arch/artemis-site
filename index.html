<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ArtEMIS / 米絲藝術</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: #02040b;
      color: white;
      font-family: system-ui;
      overflow-x: hidden;
    }

    /* 🌌 背景粒子 */
    .bg-grid {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(100,180,255,0.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100,180,255,0.1) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.15;
    }

    .glow {
      position: fixed;
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(120,200,255,0.15), transparent 70%);
      filter: blur(80px);
      top: -200px;
      left: -200px;
    }

    .glow2 {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,120,255,0.15), transparent 70%);
      bottom: -200px;
      right: -200px;
      filter: blur(80px);
    }

    .hero-title {
      font-size: clamp(40px, 6vw, 80px);
      font-weight: 600;
      letter-spacing: 2px;
    }

    .card {
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      overflow: hidden;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 0 30px rgba(120,200,255,0.2);
    }
  </style>
</head>

<body>

<div class="bg-grid"></div>
<div class="glow"></div>
<div class="glow2"></div>

<div id="app"></div>

<script>
let gallery = [];
let lang = "zh";

/* 🔥 讀 gallery.json */
async function loadGallery(){
  const res = await fetch('gallery.json');
  const data = await res.json();

  gallery = data.map(item => ({
    ...item,
    name: item.name[lang],
    category: item.category[lang],
    blurb: item.blurb[lang]
  }));
}

/* 🎨 主畫面 */
function render(){
  const app = document.getElementById("app");

  app.innerHTML = `
  <div class="max-w-7xl mx-auto px-6">

    <!-- HERO -->
    <section class="min-h-[80vh] flex flex-col items-center justify-center text-center">

      <div class="hero-title">ArtEMIS</div>
      <div class="text-xl text-white/70 mt-2">米絲藝術</div>

      <div class="mt-6 text-white/80 text-lg">
        Open for character illustration commissions!
      </div>

      <a href="#contact" 
         class="mt-8 px-10 py-4 rounded-full bg-cyan-400/20 border border-cyan-200/40 hover:bg-cyan-300/30 transition">
        立即委託
      </a>

    </section>

    <!-- 🎨 作品 -->
    <section id="work" class="py-16">

      <h2 class="text-3xl mb-10">作品展示</h2>

      <div class="grid md:grid-cols-3 gap-6">

        ${gallery.map(item => `
          <div class="card">
            <img src="${item.image}" class="w-full h-[300px] object-cover"/>
            <div class="p-4">
              <div class="text-sm text-cyan-200">${item.category}</div>
              <div class="text-xl mt-2">${item.name}</div>
              <div class="text-sm text-white/60 mt-2">${item.blurb}</div>
            </div>
          </div>
        `).join('')}

      </div>

    </section>

    <!-- 📩 聯絡 -->
    <section id="contact" class="py-20 text-center">

      <h2 class="text-3xl mb-6">聯絡</h2>

      <div class="space-y-4 text-white/70">
        <div>Discord: nagi.0.5.1.3</div>
        <div>Email: nagi0513new@gmail.com</div>
      </div>

    </section>

  </div>
  `;
}

/* 初始化 */
(async function(){
  await loadGallery();
  render();
})();
</script>

</body>
</html>
