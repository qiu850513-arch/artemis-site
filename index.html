    <style>
      html { scroll-behavior: smooth; }
      @keyframes floatSlow {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-20px); }
        100% { transform: translateY(0px); }
      }
      @keyframes drift {
        0% { transform: translateX(0px); }
        50% { transform: translateX(30px); }
        100% { transform: translateX(0px); }
      }
      @keyframes sparkle {
        0%, 100% { opacity: 0.2; transform: scale(1); }
        50% { opacity: 0.8; transform: scale(1.6); }
      }
      @keyframes beamMove {
        0% { transform: translateX(-10%) rotate(0deg); opacity: 0.2; }
        50% { transform: translateX(10%) rotate(1deg); opacity: 0.6; }
        100% { transform: translateX(-10%) rotate(0deg); opacity: 0.2; }
      }
      @keyframes gridPulse {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 0.35; }
      }
      @keyframes scanlineMove {
        0% { transform: translateY(-100%); }
        100% { transform: translateY(100%); }
      }
      @keyframes cardSweep {
        0% { transform: translateX(-140%) skewX(-18deg); opacity: 0; }
        20% { opacity: 0; }
        45% { opacity: 0.55; }
        100% { transform: translateX(180%) skewX(-18deg); opacity: 0; }
      }
      @keyframes cardPulse {
        0%, 100% { box-shadow: 0 18px 48px rgba(0,0,0,0.34), 0 0 0 rgba(90,170,255,0); }
        50% { box-shadow: 0 18px 48px rgba(0,0,0,0.4), 0 0 28px rgba(90,170,255,0.12); }
      }
      body { background: #02040b; color: white; }
      .bg-float { animation: floatSlow 12s ease-in-out infinite; }
      .bg-drift { animation: drift 18s ease-in-out infinite; }
      .beam {
        position: absolute;
        width: 120%;
        height: 200px;
        background: linear-gradient(90deg, transparent, rgba(120,180,255,0.2), transparent);
        filter: blur(25px);
        animation: beamMove 18s ease-in-out infinite;
      }
      .sparkle {
        position: absolute;
        width: 3px;
        height: 3px;
        background: rgba(180,220,255,0.9);
        border-radius: 999px;
        box-shadow: 0 0 10px rgba(120,180,255,0.8);
        animation: sparkle 4s infinite ease-in-out;
      }
      .grid-animate { animation: gridPulse 6s ease-in-out infinite; }
      .scanline {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, transparent, rgba(120,180,255,0.08), transparent);
        animation: scanlineMove 6s linear infinite;
        pointer-events: none;
      }
      .work-card {
        position: relative;
        animation: cardPulse 6s ease-in-out infinite;
      }
      .work-card::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 2rem;
        padding: 1px;
        background: linear-gradient(135deg, rgba(120,190,255,0.45), rgba(130,110,255,0.15), rgba(120,190,255,0.08));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.45;
        pointer-events: none;
        transition: opacity 240ms ease;
      }
      .work-card::after {
        content: '';
        position: absolute;
        top: -20%;
        bottom: -20%;
        width: 28%;
        background: linear-gradient(90deg, transparent, rgba(160,220,255,0.1), rgba(255,255,255,0.32), rgba(160,220,255,0.1), transparent);
        filter: blur(10px);
        transform: translateX(-140%) skewX(-18deg);
        opacity: 0;
        pointer-events: none;
      }
      .work-card:hover::before { opacity: 0.85; }
      .work-card:hover::after { animation: cardSweep 900ms ease forwards; }
    </style>

        if (orb1) orb1.style.transform = `translate(${pointer.x}px, ${pointer.y}px)`;
        if (orb2) orb2.style.transform = `translate(${-pointer.x*0.7}px, ${-pointer.y*0.7}px)`;
        document.querySelectorAll('.lang-btn').forEach(btn=>btn.addEventListener('click', ()=>{ lang = btn.dataset.lang; selected = null; document.documentElement.lang = lang === 'zh' ? 'zh-Hant' : 'en'; render(); }));
        document.querySelectorAll('.work-btn').forEach(btn=>btn.addEventListener('click', ()=>{ selected = gallery[Number(btn.dataset.work)]; render(); }));
        const copyBtn = document.getElementById('copy-discord');
        if (copyBtn) copyBtn.addEventListener('click', async ()=>{ try { await navigator.clipboard.writeText(DISCORD_ID); alert(t.discordCopied); } catch { alert(DISCORD_ID); } });
        const lightbox = document.getElementById('lightbox');
        if (lightbox) {
          lightbox.addEventListener('click', ()=>{ selected = null; render(); });
          const panel = lightbox.querySelector('.relative');
          if (panel) panel.addEventListener('click', e => e.stopPropagation());
          const close = document.getElementById('close-lightbox');
          if (close) close.addEventListener('click', ()=>{ selected = null; render(); });
        }
      }
      window.addEventListener('mousemove', (e)=>{
        pointer = { x: (e.clientX / window.innerWidth - 0.5) * 24, y: (e.clientY / window.innerHeight - 0.5) * 24 };
        const orb1 = document.getElementById('orb1');
        const orb2 = document.getElementById('orb2');
        if (orb1) orb1.style.transform = `translate(${pointer.x}px, ${pointer.y}px)`;
        if (orb2) orb2.style.transform = `translate(${-pointer.x*0.7}px, ${-pointer.y*0.7}px)`;
      });
      window.addEventListener('keydown', (e)=>{ if (e.key === 'Escape' && selected) { selected = null; render(); } });
      render();
    </script>
  </body>
</html>
